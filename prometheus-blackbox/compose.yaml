---
services:
  prometheus:
    image: quay.io/prometheus/prometheus:v3.7.3@sha256:49214755b6153f90a597adcbff0252cc61069f8ab69ce8411285cd4a560e8038
    container_name: prometheus
    depends_on:
      - blackbox_exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
    ports:
      - 9090:9090
    restart: "no"
    read_only: true
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prom_data:/prometheus:rw
  blackbox_exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.27.0@sha256:a50c4c0eda297baa1678cd4dc4712a67fdea713b832d43ce7fcc5f9bea05094d
    container_name: blackbox_exporter
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yaml
    ports:
      - 9115:9115
    restart: "no"
    read_only: true
    volumes:
      - ./blackbox_exporter:/etc/blackbox_exporter:ro
volumes:
  prom_data:
